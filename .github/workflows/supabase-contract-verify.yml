name: Supabase Contract Verify

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1"
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: supabase-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-supabase-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secret
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "${SUPABASE_DB_URL}" ]; then
            echo "Missing required GitHub Actions secret: SUPABASE_DB_URL"
            exit 1
          fi

      - name: Verify Supabase contract (strict)
        if: github.event_name != 'pull_request'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: npm run verify:supabase

      - name: Verify Supabase contract (PR best-effort)
        if: github.event_name == 'pull_request'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          npm run verify:supabase || {
            echo "Supabase contract verification failed in PR context (network/secret reachability)."
            echo "Keeping PR non-blocking; strict verification still runs on push/main and schedule."
          }
